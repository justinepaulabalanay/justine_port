<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Polling Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 300px;
            text-align: center;
        }
        #data-display {
            margin: 20px 0;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            min-height: 50px;
            line-height: 1.5;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AJAX Polling Example</h1>
        <div id="data-display">Waiting for data...</div>
        <button id="start-polling">Start Polling</button>
    </div>

    <script>
        document.getElementById('start-polling').addEventListener('click', function() {
            // Start polling when button is clicked
            startPolling();
        });

        function startPolling() {
            // Define the polling interval (e.g., every 5 seconds)
            const interval = 5000;

            // Function to make an AJAX request
            function fetchData() {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://livefeed3.chartnexus.com/Dummy/quotes?market_id=0&list=0 ,', true);
                xhr.onload = function() {
                    if (xhr.status === 200) {
                        const data = JSON.parse(xhr.responseText);
                        document.getElementById('data-display').textContent = `Data: ${data.value}`;
                    } else {
                        document.getElementById('data-display').textContent = 'Error fetching data';
                    }
                };
                xhr.send();
            }

            // Initial call to fetch data
            fetchData();

            // Set up polling
            setInterval(fetchData, interval);
        }
    </script>
</body>
</html>
