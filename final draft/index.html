<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Widget</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="widget-container">
        <header>
            <h1>Delayed Quotes</h1>
            <div class="controls">
                <select id="exchange-selector">
                    <option value="0">SGX</option>
                    <option value="2">Bursa</option>
                    <option value="3">Nasdaq</option>
                </select>
                <select id="theme-selector">
                    <option value="light">Light Theme</option>
                    <option value="dark">Dark Theme</option>
                </select>
            </div>
        </header>
        <main>
            <div class="tabs">
                <button class="tab-button" data-list="0">Top Volume</button>
                <button class="tab-button" data-list="1">Top Gainers</button>
                <button class="tab-button" data-list="2">Top Losers</button>
                <button class="tab-button" data-list="3">Top Gainers %</button>
                <button class="tab-button" data-list="4">Top Losers %</button>
            </div>
            <table id="stock-table">
                <thead>
                    <tr>
                        <th>Stock Code</th>
                        <th>Last Vol</th>
                        <th>+/-<br>%Chng</th>
                        <th>Buy<br>Buy Vol</th>
                        <th>Sell<br>Sell Vol</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
